body:
  text: 古文瑣語仲壬崩伊尹放太甲乃自立四年太平御覽卷八十三周宣王夜臥而晏起后夫人不出於房薑后既出乃脫簪珥待罪於永巷使其傅母通言於宣王曰妾之淫心見矣至使君王失禮而晏起以見君王之樂色而忘德也亂之興從婢子起敢請罪王曰寡人不德實自生過非夫人之罪也遂復薑后而勤於政事早朝晏退卒成中興之名歐陽詢藝文類聚卷十五宣王元妃獻后生子不恆期月而生后弗敢舉天子召群臣及元史皆答曰若男子也身體有不全諸骨節有不備者則可身體全骨節備不利於天子將必喪邦天子曰若而不利豫一人命棄之仲山父曰天子年長矣而未有子或者天將以是棄周棄之何益天子弗棄之且卜筮之言何必從乃弗棄楚矢箕服是喪王國虞世南北堂書鈔亡徵篇引璅語注幽王又嬖孽篇引下句周王欲殺王子宜咎立伯服釋虎將執宜咎叱之虎弭耳而服太平御覽卷八百九十一晉平公與齊景公乘至于澮見人乘白驂四駟以來平公之前有狸身而狐尾在其車右而隨公之車公問師曠曰有犬狸身而狐尾者乎師曠有頃而答曰有之首陽山神狸身而狐尾其名曰者來首陽之神飲酒于霍太山而歸其居而於澮乎見之甚善君其有喜焉太平御覽卷四十太平廣記卷二百九十一晉師曠御晉平公鼓瑟輟而笑曰齊君與其嬖戲墜于床而傷其臂平公令人書之某月某日齊君戲而傷問之于齊侯笑曰然有之太平御覽卷三百九十一晉平公夢見赤熊窺屏惡之而有疾使問子産子産曰昔共工之卿曰浮遊既敗於顓頊自沒沈淮之淵其色赤其言善笑其行善顧其狀如熊常為天下崇見之堂則王天下者死見堂下則邦人駭見門則近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾問太平御覽卷九百八路史後紀卷二羅蘋注有鳥飛從西方來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色皆備其名曰搖其為吾君臣其祥先至矣太平御覽卷九百十七范獻子卜獵占之曰此其繇也君子得黿小人遺冠獻子獵無所得而遺其豹冠太平御覽卷八百三十二又卷九百三十二齊景公欲伐宋至曲陵夢見大君子甚長有短丈夫賓於前公告晏子晏子曰君所夢何如哉公曰大君子甚長而大大下而小上其言甚怒好仰晏子曰若是則盤庚也夫盤庚長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也其賓者甚短大上而小下其言甚怒好俯晏子曰如是則伊尹也伊尹甚大而短大上小下赤色而髯其言好俯而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋初刑史子臣請宋景公曰從今以往五祀日臣死自臣死後五年五月丁亥吳亡以後五祀八月辛巳君薨刑史子臣至死日朝見景公夕而死後吳亡景公懼思刑史子臣之言將死日乃逃於瓜圃遂死焉求得已蟲矣藝文類聚卷八十七太平御覽卷九百七十八吳淑事類賦瓜賦注晉冶氏女徒病棄之舞囂之馬僮飲馬而見之病徒曰吾良夢馬僮曰汝奚夢乎曰吾夢乘水入河汾三馬當以舞僮告舞囂自往視之曰尚可活吾買汝答曰棄之矣猶未死乎舞囂曰未遂買之至舞囂氏而疾有間而生荀林父太平御覽卷六百四十二智伯既敗將出走夢火見於南方及夫出奔秦又夢火見於南方遂奔楚也太平御覽卷八百六十九魯國多盜季康子治之獲一人焉詰之曰汝胡以盜對曰此猶之蟻羶也慕羶而附寧可已邪大夫為政不能不盜何以詰吾盜柳下跖魯之民盜也嘯其徒數千人驪山之陽抉人肝而食之享年九十而邑宰不得問也子大夫陪臣陽貨魯之家盜也國命出其手叛費囚桓子以意行國中自如寶玉大弓夫誰非先王所遺子孫世守之謂何今貨偃然竊以逋也而子大夫不得問也子大夫之家魯之國盜也名則魯臣實魯君焉國政為家事國賦為家賦藐然魯國如無有焉而魯君不得問也魯君魯之大夫也乾侯之難亦惟季孫意如之故不得正其終魯君靦然不斥季孫之立而以為身則魯何以有王章也逐一君復易一君而周天子不得問也吾儕小人其何知知則於人而已矣子大夫與吾儕小人其俱負翳以謀朝夕耳詰安用之康子曰辨哉盜也去之縶於獄中
